[package]
name = "vite-plus-global-cli"
version = "0.0.0"
edition = "2024"
description = "Vite+ Global CLI"

[dependencies]
clap = { workspace = true, features = ["derive", "help"] }
fspy = { workspace = true }
napi = { workspace = true }
napi-derive = { workspace = true }
tokio = { workspace = true, features = ["fs"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
vite_command = { workspace = true }
vite_error = { workspace = true }
vite_install = { workspace = true }
vite_migration = { workspace = true }
vite_path = { workspace = true }
vite_workspace = { workspace = true }

[build-dependencies]
napi-build = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lib]
crate-type = ["cdylib"]
