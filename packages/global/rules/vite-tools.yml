# vite => vite dev
---
id: replace-vite-alone
language: bash
rule:
  kind: command
  has:
    kind: command_name
    regex: '^vite$'
  not:
    has:
      kind: word
      field: argument
fix: vite dev

# vite [OPTIONS] => vite dev [OPTIONS]
---
id: replace-vite-with-args
language: bash
severity: info
rule:
  pattern: vite $$$ARGS
  not:
    # ignore non-flag arguments
    regex: 'vite\s+[^-]'
fix: vite dev $$$ARGS

