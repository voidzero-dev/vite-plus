name: 'Build with Upstream Repositories'
description: 'Builds Vite+ with the upstream repositories'
inputs:
  target:
    description: 'The target platform'
    required: true
  print-after-build:
    description: 'Print the output after the build'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - uses: ./.github/actions/download-rolldown-binaries
      with:
        github-token: ${{ github.token }}
        target: ${{ inputs.target }}
        upload: 'false'

    # Compute cache key once before any builds modify files
    # (packages/cli/package.json is modified by syncTestPackageExports during build-ts)
    # Include env vars (RELEASE_BUILD, DEBUG, VERSION) to ensure cache miss on release builds
    - name: Compute NAPI binding cache key
      id: cache-key
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.target }}
        RELEASE_BUILD_VALUE: ${{ env.RELEASE_BUILD }}
        DEBUG_VALUE: ${{ env.DEBUG }}
        VERSION_VALUE: ${{ env.VERSION }}
        NPM_TAG_VALUE: ${{ env.NPM_TAG }}
        CACHE_HASH: ${{ hashFiles('packages/tools/.upstream-versions.json', 'Cargo.lock', 'crates/**/*.rs', 'crates/*/Cargo.toml', 'packages/cli/binding/**/*.rs', 'packages/cli/binding/Cargo.toml', 'Cargo.toml', '.cargo/config.toml', 'packages/cli/package.json', 'packages/cli/build.ts', 'packages/cli/tsdown.config.ts') }}
      run: |
        echo "key=napi-binding-v3-${BUILD_TARGET}-${RELEASE_BUILD_VALUE}-${DEBUG_VALUE}-${VERSION_VALUE}-${NPM_TAG_VALUE}-${CACHE_HASH}" >> "$GITHUB_OUTPUT"

    # Resolve the Rust target directory (CARGO_TARGET_DIR from setup-rust, or default "target")
    - name: Resolve Rust target directory
      id: rust-target
      shell: bash
      run: echo "dir=${CARGO_TARGET_DIR:-target}" >> $GITHUB_OUTPUT

    # Cache NAPI bindings and Rust CLI binary (the slow parts, especially on Windows)
    - name: Restore NAPI binding cache
      id: cache-restore
      uses: actions/cache/restore@94b89442628ad1d101e352b7ee38f30e1bef108e # v5
      with:
        path: |
          packages/cli/binding/*.node
          packages/cli/binding/index.js
          packages/cli/binding/index.d.ts
          packages/cli/binding/index.cjs
          packages/cli/binding/index.d.cts
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp.exe
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp-shim.exe
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp-setup.exe
        key: ${{ steps.cache-key.outputs.key }}

    # Apply Vite+ branding patches to vite source (CI checks out
    # upstream vite which doesn't have branding patches)
    - name: Brand vite
      shell: bash
      run: pnpm exec tool brand-vite

    # Build upstream TypeScript packages first (don't depend on native bindings)
    - name: Build upstream TypeScript packages
      shell: bash
      run: |
        pnpm --filter @rolldown/pluginutils build
        pnpm --filter rolldown build-node
        pnpm --filter vite build-types
        pnpm --filter "@voidzero-dev/*" build
        pnpm --filter vite-plus build-ts

    # Install zig + cargo-zigbuild for musl cross-compilation (napi-cross only supports gnu)
    - name: Add musl Rust target
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'musl')
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.target }}
      run: rustup target add "$BUILD_TARGET"

    - name: Setup zig (musl)
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'musl')
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      with:
        version: 0.15.2

    - name: Install cargo-zigbuild (musl)
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'musl')
      uses: taiki-e/install-action@f916cfac5d8efd040e250d0cd6b967616504b3a4 # v2.68.32
      with:
        tool: cargo-zigbuild

    # NAPI builds - only run on cache miss (slow, especially on Windows)
    # Must run before vite-plus TypeScript builds which depend on the bindings
    - name: Build NAPI bindings (Linux gnu)
      shell: bash
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'linux') && !contains(inputs.target, 'musl')
      run: |
        pnpm --filter=vite-plus build-native --target "$BUILD_TARGET" --use-napi-cross
      env:
        BUILD_TARGET: ${{ inputs.target }}
        TARGET_CC: clang
        TARGET_CFLAGS: ${{ contains(inputs.target, 'aarch64') && '-D_BSD_SOURCE' || '' }}
        DEBUG: napi:*

    - name: Build NAPI bindings (Linux musl)
      shell: bash
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'musl')
      run: |
        pnpm --filter=vite-plus build-native --target "$BUILD_TARGET" -x
      env:
        BUILD_TARGET: ${{ inputs.target }}
        TARGET_CC: clang
        TARGET_CFLAGS: ${{ contains(inputs.target, 'aarch64') && '-D_BSD_SOURCE' || '' }}
        DEBUG: napi:*

    - name: Build NAPI bindings (non-Linux targets)
      shell: bash
      if: steps.cache-restore.outputs.cache-hit != 'true' && !contains(inputs.target, 'linux')
      run: |
        pnpm --filter=vite-plus build-native --target "$BUILD_TARGET"
      env:
        BUILD_TARGET: ${{ inputs.target }}
        DEBUG: napi:*

    - name: Build Rust CLI binary (Linux gnu)
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'linux') && !contains(inputs.target, 'musl')
      shell: bash
      run: |
        pnpm exec napi build --use-napi-cross --target "$BUILD_TARGET" --release -p vite_global_cli
      env:
        BUILD_TARGET: ${{ inputs.target }}
        TARGET_CC: clang
        TARGET_CFLAGS: ${{ contains(inputs.target, 'aarch64') && '-D_BSD_SOURCE' || '' }}
        DEBUG: napi:*

    - name: Build Rust CLI binary (Linux musl)
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'musl')
      shell: bash
      run: |
        pnpm exec napi build -x --target "$BUILD_TARGET" --release -p vite_global_cli
      env:
        BUILD_TARGET: ${{ inputs.target }}
        TARGET_CC: clang
        TARGET_CFLAGS: ${{ contains(inputs.target, 'aarch64') && '-D_BSD_SOURCE' || '' }}
        DEBUG: napi:*

    - name: Build Rust CLI binary (non-Linux targets)
      if: steps.cache-restore.outputs.cache-hit != 'true' && !contains(inputs.target, 'linux')
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.target }}
      run: cargo build --release --target "$BUILD_TARGET" -p vite_global_cli

    - name: Build trampoline shim binary (Windows only)
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'windows')
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.target }}
      run: cargo build --release --target "$BUILD_TARGET" -p vite_trampoline

    - name: Build installer binary (Windows only)
      if: steps.cache-restore.outputs.cache-hit != 'true' && contains(inputs.target, 'windows')
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.target }}
      run: cargo build --release --target "$BUILD_TARGET" -p vite_installer

    - name: Save NAPI binding cache
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@94b89442628ad1d101e352b7ee38f30e1bef108e # v5
      with:
        path: |
          packages/cli/binding/*.node
          packages/cli/binding/index.js
          packages/cli/binding/index.d.ts
          packages/cli/binding/index.cjs
          packages/cli/binding/index.d.cts
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp.exe
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp-shim.exe
          ${{ steps.rust-target.outputs.dir }}/${{ inputs.target }}/release/vp-setup.exe
        key: ${{ steps.cache-key.outputs.key }}

    # Build vite-plus TypeScript after native bindings are ready
    - name: Build vite-plus TypeScript packages
      shell: bash
      run: |
        pnpm --filter=vite-plus build-ts

    - name: Print output after build
      shell: bash
      if: inputs.print-after-build == 'true'
      run: |
        pnpm vp -h
        pnpm vp run -h
        pnpm vp lint -h
        pnpm vp test -h
        pnpm vp build -h
        pnpm vp fmt -h
