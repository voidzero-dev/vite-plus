name: Compute Release Version
description: Get latest tag from GitHub and increment the patch version

inputs:
  npm_tag:
    description: 'npm tag (latest or alpha)'
    required: true
    default: 'latest'

outputs:
  version:
    description: The computed version string
    value: ${{ steps.version.outputs.version }}

runs:
  using: composite
  steps:
    - name: Compute next patch version
      id: version
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        NPM_TAG: ${{ inputs.npm_tag }}
      run: |
        git fetch --tags --quiet
        npm install --prefix "$ACTION_PATH" semver > /dev/null 2>&1
        VERSION_OUTPUT=$(node "$ACTION_PATH/compute-version.mjs" "$NPM_TAG")
        echo "$VERSION_OUTPUT"
        echo "$VERSION_OUTPUT" | tail -n 1 >> $GITHUB_OUTPUT
