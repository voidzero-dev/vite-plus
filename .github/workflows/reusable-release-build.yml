name: Reusable Release Build

permissions: {}

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to stamp into Cargo.toml and produced binaries.'
        type: string
        required: true
      cache-key:
        description: 'setup-rust cache-key prefix; pass a distinct value per caller (e.g. "release", "pkg-pr-new") to avoid cross-workflow cache pollution.'
        type: string
        required: false
        default: 'release'

jobs:
  build-rust:
    name: Build (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.os }}
    permissions:
      contents: read
    env:
      RELEASE_BUILD: 'true'
      DEBUG: 'napi:*'
      VERSION: ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: namespace-profile-windows-4c-8g
          - target: aarch64-pc-windows-msvc
            os: namespace-profile-windows-4c-8g
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: ./.github/actions/clone
      - uses: oxc-project/setup-rust@68c3199c5339f965e6e163924c3c450773eba42b # main (pending v1.0.17 — Swatinem/rust-cache v2.9.1 for node24)
        with:
          save-cache: ${{ github.ref_name == 'main' }}
          cache-key: ${{ inputs.cache-key }}

      - name: Rustup Adds Target
        run: rustup target add ${{ matrix.settings.target }}

      - uses: oxc-project/setup-node@4c588e9266bd930b6ddc34307df0659ed511d187 # v1.3.1

      - name: Set build version
        shell: bash
        run: |
          set -euo pipefail
          # Stamp ${VERSION} as the [package] version so CARGO_PKG_VERSION matches
          # the version that gets published/installed (the release version, or
          # 0.0.0-commit.<sha> for preview builds). Anchored to the line-start
          # `version = "..."` so crate dependency versions are never touched.
          for f in crates/vite_global_cli/Cargo.toml packages/cli/binding/Cargo.toml; do
            node -e 'const fs=require("fs"),f=process.argv[1];fs.writeFileSync(f,fs.readFileSync(f,"utf8").replace(/^version = "[^"]*"/m,`version = "${process.env.VERSION}"`))' "$f"
          done
          # Stamp packages/cli/package.json too so the bundled JS dist inlines
          # ${VERSION} as cliPkg.version (VITE_PLUS_VERSION). Without this a preview
          # `vp migrate` pins the build-time release placeholder instead of the
          # test build, and skips the registry-bridge .npmrc.
          pnpm exec json-edit packages/cli/package.json '_.version = process.env.VERSION'

      - name: Verify version replacement
        shell: bash
        run: |
          set -euo pipefail
          for f in crates/vite_global_cli/Cargo.toml packages/cli/binding/Cargo.toml; do
            if ! grep -qF "version = \"${VERSION}\"" "$f"; then
              echo "ERROR: version stamp failed for $f"; head -5 "$f"; exit 1
            fi
          done
          if [ "$(node -p "require('./packages/cli/package.json').version")" != "${VERSION}" ]; then
            echo "ERROR: version stamp failed for packages/cli/package.json"; exit 1
          fi
          echo "Version stamp verified: ${VERSION}"

      - name: Build
        uses: ./.github/actions/build-upstream
        with:
          target: ${{ matrix.settings.target }}

      - name: Upload Vite+ native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vite-plus-native-${{ matrix.settings.target }}
          path: ./packages/cli/binding/*.node
          if-no-files-found: error

      - name: Upload Rust CLI binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vite-global-cli-${{ matrix.settings.target }}
          path: |
            ./target/${{ matrix.settings.target }}/release/vp
            ./target/${{ matrix.settings.target }}/release/vp.exe
            ./target/${{ matrix.settings.target }}/release/vp-shim.exe
          if-no-files-found: error

      - name: Package release archive
        shell: bash
        working-directory: ./target/${{ matrix.settings.target }}/release
        run: |
          if [ -f vp.exe ]; then
            7z a "vp-${{ matrix.settings.target }}.zip" vp.exe vp-shim.exe
          else
            tar -czf "vp-${{ matrix.settings.target }}.tar.gz" vp
          fi

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vp-release-archive-${{ matrix.settings.target }}
          path: |
            ./target/${{ matrix.settings.target }}/release/vp-*.tar.gz
            ./target/${{ matrix.settings.target }}/release/vp-*.zip
          if-no-files-found: error

      - name: Upload installer binary artifact (Windows only)
        if: contains(matrix.settings.target, 'windows')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vp-setup-${{ matrix.settings.target }}
          path: ./target/${{ matrix.settings.target }}/release/vp-setup.exe
          if-no-files-found: error

      - name: Remove .node files before upload dist
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        run: |
          rm ./packages/core/dist/**/*.node

      - name: Upload core dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        with:
          name: core
          path: ./packages/core/dist
          if-no-files-found: error

      - name: Upload prompts dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        with:
          name: prompts
          path: ./packages/prompts/dist
          if-no-files-found: error

      - name: Upload cli dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        with:
          name: cli
          path: ./packages/cli/dist
          if-no-files-found: error

      - name: Upload cli docs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        with:
          name: cli-docs
          path: ./packages/cli/docs
          if-no-files-found: error

      - name: Upload LICENSE files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.settings.target == 'x86_64-unknown-linux-gnu' }}
        with:
          name: licenses
          path: |
            ./packages/core/LICENSE
            ./packages/cli/LICENSE
          if-no-files-found: error
