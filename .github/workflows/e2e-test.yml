name: E2E Test

permissions: {}

on:
  workflow_dispatch:
  schedule:
    # Run every day at 0:00 GMT (8:00 AM Singapore time)
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  pull_request:
    types: [opened, synchronize, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

defaults:
  run:
    shell: bash

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      related-files-changed: ${{ steps.filter.outputs.related-files }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            related-files:
              - 'packages/**/build.ts'
              - .github/workflows/e2e-test.yml
              - 'ecosystem-ci/*'

  download-previous-rolldown-binaries:
    needs: detect-changes
    runs-on: ubuntu-latest
    # Run if: not a PR, OR PR has 'test: e2e' label, OR PR is from the deps/upstream-update or a renovate/** dependency branch, OR build.ts files changed
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'test: e2e') ||
      github.head_ref == 'deps/upstream-update' ||
      startsWith(github.head_ref, 'renovate/') ||
      needs.detect-changes.outputs.related-files-changed == 'true'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: ./.github/actions/download-rolldown-binaries
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Cross-compile the Windows vite-plus binding + vp binaries on Linux so the
  # build job's windows-latest entry only runs the (fast) JS/pack pass with
  # skip-native, instead of the ~24m native Rust compile. The core/rolldown
  # bundling stays on Windows (it is host-platform specific), so this can't be
  # folded into the build job. Shares ci.yml's windows-cli-xwin cache.
  build-windows-cli:
    needs: detect-changes
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'test: e2e') ||
      github.head_ref == 'deps/upstream-update' ||
      startsWith(github.head_ref, 'renovate/') ||
      needs.detect-changes.outputs.related-files-changed == 'true'
    name: Build Windows CLI binaries
    runs-on: namespace-profile-linux-x64-default
    permissions:
      contents: read
      packages: read
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: ./.github/actions/clone
      - uses: ./.github/actions/build-windows-cli
        with:
          save-cache: ${{ github.ref_name == 'main' }}

  build:
    name: Build vite-plus packages (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    needs:
      - download-previous-rolldown-binaries
      - build-windows-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: namespace-profile-windows-4c-8g
            target: x86_64-pc-windows-msvc
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: ./.github/actions/clone

      # Disable Windows Defender real-time scanning to speed up I/O-heavy builds (~30-50% faster)
      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      # Windows builds against the prebuilt binaries from build-windows-cli, so
      # it needs no Rust toolchain here.
      - uses: oxc-project/setup-rust@68c3199c5339f965e6e163924c3c450773eba42b # main (pending v1.0.17 — Swatinem/rust-cache v2.9.1 for node24)
        if: ${{ !contains(matrix.target, 'windows') }}
        with:
          save-cache: ${{ github.ref_name == 'main' }}
          cache-key: e2e-build-${{ matrix.os }}

      - uses: oxc-project/setup-node@4c588e9266bd930b6ddc34307df0659ed511d187 # v1.3.1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-binaries
          path: ./rolldown/packages/rolldown/src
          merge-multiple: true

      # Prebuilt by build-windows-cli (Linux + cargo-xwin); placed where
      # build-upstream's skip-native pass and the pack step expect them.
      - name: Download prebuilt Windows binaries
        if: contains(matrix.target, 'windows')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-cli-binaries

      - name: Build with upstream
        uses: ./.github/actions/build-upstream
        with:
          target: ${{ matrix.target }}
          skip-native: ${{ contains(matrix.target, 'windows') }}

      - name: Pack packages into tgz
        run: |
          mkdir -p tmp/tgz
          # patch-project.ts serves these tgz through a local npm registry
          # (packages/tools/src/local-npm-registry.ts), so `vp migrate` pins
          # and installs them like a real release, with every package manager
          # (including bun) resolving the standard
          # `vite -> npm:@voidzero-dev/vite-plus-core@<version>` alias. Pin
          # both packages to 0.0.0 so a correctly installed local build is
          # always distinguishable from any published version
          # (verify-install.ts asserts it), even on a release commit that
          # leaves packages/{core,cli} at a published version.
          (cd packages/core && npm pkg set version=0.0.0)
          (cd packages/cli && npm pkg set version=0.0.0)
          cd packages/core && pnpm pack --pack-destination ../../tmp/tgz && cd ../..
          cd packages/cli && pnpm pack --pack-destination ../../tmp/tgz && cd ../..
          # Copy vp binary for e2e-test job (findVpBinary expects it in target/)
          cp target/${{ matrix.target }}/release/vp tmp/tgz/vp 2>/dev/null || cp target/${{ matrix.target }}/release/vp.exe tmp/tgz/vp.exe 2>/dev/null || true
          cp target/${{ matrix.target }}/release/vp-shim.exe tmp/tgz/vp-shim.exe 2>/dev/null || true
          ls -la tmp/tgz

      - name: Upload tgz artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vite-plus-packages-${{ matrix.os }}
          path: tmp/tgz/
          retention-days: 1

  e2e-test:
    name: ${{ matrix.project.name }} E2E test (${{ matrix.os }})
    env:
      # For packing manager install from github package registry
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    needs:
      - build
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.project.timeout || 10 }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - namespace-profile-windows-4c-8g
        project:
          - name: vibe-dashboard
            node-version: 24
            command: |
              # FIXME: Failed to load JS plugin: ./plugins/debugger.js
              # vp run ready
              vp fmt
              vp test
              vp run build
          # FIXME: TypeError: Failed to fetch dynamically imported module
          # - name: skeleton
          #   node-version: 24
          #   command: |
          #     vp run format
          #     vp run lint:check
          #     vp run check
          #     npx playwright install chromium
          #     vp run test
          - name: rollipop
            node-version: 22
            command: |
              vp run -r build
              # FIXME: typescript-eslint(no-redundant-type-constituents): 'rolldownExperimental.DevEngine' is an 'error' type that acts as 'any' and overrides all other types in this union type.
              vp run lint || true
              # FIXME: src/bundler-pool.ts(8,8): error TS2307: Cannot find module '@rollipop/core' or its corresponding type declarations.
              vp run -r typecheck || true
              vp run format
              vp run @rollipop/common#test
              vp run @rollipop/core#test
              vp run @rollipop/dev-server#test
          - name: frm-stack
            node-version: 24
            command: |
              vp run lint:check
              vp run format:check
              vp run typecheck
              vp run @yourcompany/api#test
              vp run @yourcompany/backend-core#test
          - name: vue-mini
            node-version: 24
            command: |
              # FIXME: skip format for now, will re-enable after prettier migration support
              # vp run format
              # FIXME: oxlint 1.59.0 no-useless-assignment has false positives on module-level
              # state variables and closure-captured variables (oxc-project/oxc#3022).
              # The migration sets the rule as "error" in vite.config.ts, so --allow can't override it.
              vp run lint || true
              vp run type
              vp run test -- --coverage
          # SKIP: vite-plugin-react - vite-task config loading incompatibility
          # vite-task needs to load vite.config.js for all workspace packages to build the task graph,
          # but the vite-plus process starts with workspace root as cwd.
          # The plugin-react-swc playgrounds use SWC plugins (e.g., @swc/plugin-emotion) which
          # cannot be resolved when loading the config from workspace root.
          #
          # Minimal reproduction:
          #   git clone https://github.com/vitejs/vite-plugin-react /tmp/vite-plugin-react-test
          #   cd /tmp/vite-plugin-react-test && pnpm install && pnpm run build
          #   node packages/plugin-react-swc/playground/emotion-plugin/vite.config.js
          #   # Error: Cannot find module '@swc/plugin-emotion'
          #
          # This works when running from within the playground directory (pnpm run build)
          # because pnpm's symlink structure allows resolution, but fails when loading from workspace root.
          # - name: vite-plugin-react
          #   node-version: 22
          #   command: |
          #     vp run format
          #     vp run lint -- --fix
          #     # TODO(fengmk2): run all builds and tests after tsdown version upgrade
          #     vp run @vitejs/plugin-rsc#build
          #     vp run @vitejs/plugin-rsc#test
          - name: vitepress
            node-version: 24
            command: |
              vp run format
              vp run build
              vp test run -r __tests__/unit
              vp run tests-e2e#test
              VITE_TEST_BUILD=1 vp run tests-e2e#test
              vp run tests-init#test
          - name: tanstack-start-helloworld
            node-version: 24
            command: |
              vp run test
              vp run build
          - name: oxlint-plugin-complexity
            node-version: 22
            command: |
              vp run format
              vp run format:check
              vp run build
              vp run lint
              vp run test:run
              npx tsc --noEmit
          - name: vite-vue-vercel
            node-version: 24
            command: |
              vp run test
              vp run build
          - name: dify
            node-version: 24
            directory: web
            command: |
              vp run type-check
              vp run build
              vp run test navigation-utils.test.ts real-browser-flicker.test.tsx workflow-onboarding-integration.test.tsx
          - name: viteplus-ws-repro
            node-version: 24
            command: |
              vp test run
          - name: vp-config
            node-version: 22
            command: |
              vp check
              vp pack
              vp test
          - name: vinext
            node-version: 24
            # The vinext suite is ~7000 tests and needs more than the default
            # 10-minute job budget on 4-core runners.
            timeout: 15
            command: |
              # vp migrate's auto-install passes --ignore-scripts on pnpm v11
              # (vinext pins pnpm 11), which skips vinext's approved
              # better-sqlite3 build, and the follow-up `vp install` never
              # re-runs it. Rebuild it so the better-auth fixture works.
              vp rebuild -- -r better-sqlite3
              vp run build
              vp check --fix
              vp run check
              vp run test
          - name: reactive-resume
            node-version: 24
            command: |
              vp fmt
              vp lint --type-aware
              vp build
              vp test
          - name: yaak
            node-version: 24
            command: |
              vp fmt --ignore-path .oxfmtignore
              # FIXME: type-aware lint fails with "Invalid tsconfig" without full Rust/wasm bootstrap
              vp lint || true
              vp test
          - name: npmx.dev
            node-version: 24
            command: |
              vp fmt
              # FIXME: oxlint 1.59.0 vitest/require-mock-type-parameters errors
              # on vi.fn() calls — migration sets rule as "error" in config, --allow can't override
              vp run lint || true
              vp run test:types
              vp test --project nuxt
              vp test --project unit
          - name: vite-plus-jest-dom-repro
            node-version: 24
            command: |
              vp test run
          - name: bun-vite-template
            node-version: 24
            command: |
              # FIXME: mantine uses postcss-simple-vars (e.g. `@media (max-width:
              # $mantine-breakpoint-md)` in src/components/Welcome/Welcome.module.css),
              # which oxfmt's CSS parser does not support yet (regressed in oxfmt 0.57.0
              # after the switch to oxc-css-parser). Tracking issue:
              # https://github.com/oxc-project/oxc/issues/23969. Drop the `|| true`
              # once postcss-simple-vars syntax is supported.
              vp fmt || true
              vp run validate
          - name: vite-plus-vitest-global-type-minimal-repro
            node-version: 24
            command: |
              vp test
              vp check --fix
          - name: vitest-playwright-repro
            node-version: 24
            command: |
              vp test
          - name: vite-plus-vitest-type-aug
            node-version: 24
            command: |
              vp check --fix
          - name: vite-plus-monorepo-overrides
            node-version: 24
            command: |
              vp check --fix
              vp run verify
          - name: varlet
            node-version: 22
            command: |
              # scripts/bootstrap.mjs spawns `pnpm build` via tinyexec and needs
              # pnpm on PATH (not exposed by the vp install itself). corepack
              # enable creates a pnpm launcher in the vp bin dir that resolves
              # the project's pinned packageManager version (pnpm@9.15.9).
              corepack enable
              node scripts/bootstrap.mjs
              # Report-only: oxlint 1.68.0 surfaces ts1038 ("A 'declare' modifier
              # cannot be used in an already ambient context.") on varlet's
              # packages/varlet-cli/src/module.d.ts, which carries a redundant
              # `declare` inside an ambient `declare module 'jest'` block. varlet can
              # only drop the redundant modifier upstream once a vite-plus release
              # ships oxlint 1.68.0, so don't fail the matrix on it yet. Follow-up:
              # submit a fix PR to varletjs/varlet after the next vite-plus release.
              vp run lint || true
              vp run test:coverage
        exclude:
          # frm-stack uses Docker (testcontainers) which doesn't work the same way on Windows
          - os: namespace-profile-windows-4c-8g
            project:
              name: frm-stack
          # dify only runs on Linux for now
          - os: namespace-profile-windows-4c-8g
            project:
              name: dify
          # vinext uses workerd native deps that don't build on Windows
          - os: namespace-profile-windows-4c-8g
            project:
              name: vinext
          # yaak is a Tauri app with Rust/wasm deps
          - os: namespace-profile-windows-4c-8g
            project:
              name: yaak
          # npmx.dev is a Nuxt app, ubuntu-only for now
          - os: namespace-profile-windows-4c-8g
            project:
              name: npmx.dev
          # varlet upstream CI is ubuntu-only
          - os: namespace-profile-windows-4c-8g
            project:
              name: varlet

    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: ./.github/actions/clone
        with:
          ecosystem-ci-project: ${{ matrix.project.name }}

      # Disable Windows Defender real-time scanning to speed up I/O-heavy operations
      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.project.node-version }}
          package-manager-cache: false

      - name: Download vite-plus packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vite-plus-packages-${{ matrix.os }}
          path: tmp/tgz

      - name: Install vp CLI
        shell: bash
        run: |
          # Place vp binary where install-global-cli.ts expects it (target/release/)
          mkdir -p target/release
          cp tmp/tgz/vp target/release/vp 2>/dev/null || cp tmp/tgz/vp.exe target/release/vp.exe 2>/dev/null || true
          cp tmp/tgz/vp-shim.exe target/release/vp-shim.exe 2>/dev/null || true
          chmod +x target/release/vp 2>/dev/null || true
          VP_TGZ=$(ls "$GITHUB_WORKSPACE"/tmp/tgz/vite-plus-[0-9]*.tgz | head -n1)
          node "$GITHUB_WORKSPACE"/packages/tools/src/install-global-cli.ts --tgz "$VP_TGZ"
          # Use USERPROFILE (native Windows path) instead of HOME (Git Bash path /c/Users/...)
          # so cmd.exe and Node.js execSync can resolve binaries in PATH
          echo "${USERPROFILE:-$HOME}/.vite-plus/bin" >> $GITHUB_PATH

      - name: Migrate in ${{ matrix.project.name }}
        working-directory: ${{ runner.temp }}/vite-plus-ecosystem-ci/${{ matrix.project.name }}${{ matrix.project.directory && format('/{0}', matrix.project.directory) || '' }}
        shell: bash
        # patch-project.ts starts a local npm registry serving the packed
        # local build (it stays up for the later steps; the registry env is
        # exported via GITHUB_ENV), then runs `vp migrate` and the follow-up
        # `vp install` through it, with pnpm's minimumReleaseAge gate disabled
        # so freshly published upstream deps install. See its comments.
        run: node $GITHUB_WORKSPACE/ecosystem-ci/patch-project.ts ${{ matrix.project.name }}

      - name: Verify local packages installed
        working-directory: ${{ runner.temp }}/vite-plus-ecosystem-ci/${{ matrix.project.name }}${{ matrix.project.directory && format('/{0}', matrix.project.directory) || '' }}
        shell: bash
        run: node $GITHUB_WORKSPACE/ecosystem-ci/verify-install.ts

      - name: Determine playwright requirement
        id: pw
        shell: bash
        run: |
          needs=$(jq -r --arg p '${{ matrix.project.name }}' '.[$p].playwright // false' "$GITHUB_WORKSPACE/ecosystem-ci/repo.json")
          echo "needs=$needs" >> "$GITHUB_OUTPUT"

      - name: Install Playwright chromium
        if: steps.pw.outputs.needs == 'true'
        working-directory: ${{ runner.temp }}/vite-plus-ecosystem-ci/${{ matrix.project.name }}${{ matrix.project.directory && format('/{0}', matrix.project.directory) || '' }}
        shell: bash
        run: npx playwright install chromium

      - name: Run vite-plus commands in ${{ matrix.project.name }}
        working-directory: ${{ runner.temp }}/vite-plus-ecosystem-ci/${{ matrix.project.name }}${{ matrix.project.directory && format('/{0}', matrix.project.directory) || '' }}
        run: ${{ matrix.project.command }}

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: e2e-test
    if: ${{ failure() && github.event_name == 'schedule' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create or update GitHub issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ISSUE_TITLE="E2E Test Scheduled Run Failed"
          ISSUE_LABEL="e2e-failure"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Create label if it doesn't exist
          if ! gh label list --json name --jq '.[].name' | grep -q "^${ISSUE_LABEL}$"; then
            CREATE_LABEL_OUTPUT=$(gh label create "$ISSUE_LABEL" --color "d73a4a" --description "E2E test scheduled run failure" 2>&1)
            if [ $? -eq 0 ]; then
              echo "Created label: $ISSUE_LABEL"
            elif echo "$CREATE_LABEL_OUTPUT" | grep -qi "already exists"; then
              echo "Label '$ISSUE_LABEL' already exists, continuing."
            else
              echo "Error: Failed to create label '$ISSUE_LABEL':"
              echo "$CREATE_LABEL_OUTPUT" >&2
              exit 1
            fi
          fi

          # Search for existing open issue with the label
          EXISTING_ISSUE=$(gh issue list --label "$ISSUE_LABEL" --state open --json number --jq '.[0].number')

          if [ -z "$EXISTING_ISSUE" ]; then
            # Create new issue if none exists
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label "$ISSUE_LABEL" \
              --body "The scheduled E2E test run has failed.

          **Failed Run:** $RUN_URL
          **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          Please investigate the failure and fix any issues."
            echo "Created new issue"
          else
            # Add comment to existing issue
            gh issue comment "$EXISTING_ISSUE" \
              --body "The scheduled E2E test run has failed again.

          **Failed Run:** $RUN_URL
          **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Added comment to issue #$EXISTING_ISSUE"
          fi
