name: CI

permissions:
  # Doing it explicitly because the default permission only includes metadata: read.
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: 0
  # RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        env:
          CARGO_INCREMENTAL: "1"
      - name: Cache cargo
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0
        if: ${{ runner.os != 'Windows' }}
        with:
          save-if: ${{ github.ref_name == 'main' }}
          shared-key: ${{ matrix.os }}-${{ matrix.target }}
      - run: cargo check --all-targets --all-features
      - run: cargo test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        env:
          CARGO_INCREMENTAL: "1"
        with:
          components: clippy,rust-docs,rustfmt

      - run: |
          cargo fmt --check
          # cargo clippy --all-targets --all-features -- -D warnings
          RUSTDOCFLAGS='-D warnings' cargo doc --no-deps --document-private-items

      - uses: crate-ci/typos@master
        with:
          files: .

  run:
    name: Run task
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        env:
          CARGO_INCREMENTAL: "1"

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build self
        run: cargo build --bin vt

      - name: Run self
        run: ./target/debug/vt run -r build

      - name: Print help for built-in commands
        run: |
          cp packages/cli/binding/*.node packages/cli/dist
          export PATH="$PATH:$(pwd)/packages/cli/bin"
          vite-plus -h
          vite-plus run -h
          vite-plus lint -h
          vite-plus test -h
          vite-plus build -h
          vite-plus fmt -h

  cli-e2e-test:
    name: CLI E2E test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        env:
          CARGO_INCREMENTAL: "1"

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build CLI
        run: |
          pnpm run --filter=@voidzero-dev/vite-plus build
          cp packages/cli/binding/*.node packages/cli/dist

      - name: Run CLI E2E tests
        run: |
          pnpm run --filter=@voidzero-dev/vite-plus test
          git diff --exit-code

  install-e2e-test:
    name: vite install E2E test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        env:
          CARGO_INCREMENTAL: "1"

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build vt
        run: cargo build --bin vt --release

      - name: Run vt install
        run: |
          export PATH=$PWD/target/release:$PATH

          # Test vt install on various repositories with different package managers
          repos=(
            # pnpm workspace
            "vitejs/vite:vite"
            "pnpm/pnpm:pnpm"
            # yarn workspace
            "napi-rs/napi-rs:napi-rs"
            "toeverything/AFFiNE:AFFiNE"
            # npm workspace
            "npm/cli:npm"
            "redhat-developer/vscode-extension-tester:vscode-extension-tester"
          )

          for repo_info in "${repos[@]}"; do
            IFS=':' read -r repo dir_name <<< "$repo_info"
            echo "Testing vt install on $repo..."
            # remove the directory if it exists
            if [ -d "/tmp/$dir_name" ]; then
              rm -rf "/tmp/$dir_name"
            fi
            git clone --depth 1 "https://github.com/$repo.git" "/tmp/$dir_name"
            cd "/tmp/$dir_name"
            # retry 3 times
            for i in {1..3}; do
              vt install
              if [ $? -eq 0 ]; then
                break
              fi
              rm -rf node_modules
            done
            # run again to show install cache increase by time
            time vt install
            echo "✓ Successfully installed dependencies for $repo"
            echo ""
          done

  done:
    runs-on: ubuntu-latest
    needs:
      - test
      - lint
      - run
      - cli-e2e-test
      - install-e2e-test
    steps:
      - run: exit 1
        # Thank you, next https://github.com/vercel/next.js/blob/canary/.github/workflows/build_and_test.yml#L379
        if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
