name: Cargo Deny

permissions: {}

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/deny.yml'
  push:
    branches:
      - main
    paths:
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/deny.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Output rolldown hash
        id: upstream-versions
        run: node -e "console.log('ROLLDOWN_HASH=' + require('./packages/tools/.upstream-versions.json').rolldown.hash)" >> $GITHUB_OUTPUT

      - name: Clone rolldown
        shell: bash
        run: |
          git init rolldown
          git -C rolldown remote add origin https://github.com/rolldown/rolldown
          git -C rolldown config --local gc.auto 0
          git -C rolldown fetch --no-tags --depth=1 origin "${{ steps.upstream-versions.outputs.ROLLDOWN_HASH }}"
          git -C rolldown checkout --force FETCH_HEAD

      - uses: oxc-project/setup-rust@23f38cfb0c04af97a055f76acee94d5be71c7c82 # v1.0.16
        with:
          restore-cache: false
          # Pinned to 0.18.6+ for CVSS 4.0 support (EmbarkStudios/cargo-deny#805)
          tools: cargo-deny@0.19.0

      - run: cargo deny check
