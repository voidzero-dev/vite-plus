name: Publish

on:
  workflow_dispatch:
    inputs:
      first_release:
        description: Set to true only for the very first publish
        required: false
        default: false
        type: boolean
  # Optional automation examples after you confirm your release boundary:
  # push:
  #   branches:
  #     - <default-branch>
  #   tags:
  #     - <release-tag-pattern>

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - __PACKAGE_MANAGER_SETUP__
      - name: Install dependencies
        run: __INSTALL_COMMAND__

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish release
        shell: bash
        env:
          FIRST_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.first_release || 'false' }}
        run: |
          if [[ "${FIRST_RELEASE}" == "true" ]]; then
            __FIRST_RELEASE_COMMAND__
          else
            __RELEASE_COMMAND__
          fi

      - name: Push release commit and tags
        run: |
          git push origin HEAD
          git push origin --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo_tag="$(git tag --points-at HEAD 'v*' | head -n1)"
          if [[ -z "$repo_tag" ]]; then
            echo "No repository tag was created by vp release; skipping GitHub Release."
            exit 0
          fi
          if gh release view "$repo_tag" >/dev/null 2>&1; then
            echo "GitHub Release already exists for $repo_tag; skipping."
            exit 0
          fi
          gh release create "$repo_tag" --generate-notes --title "$repo_tag"
