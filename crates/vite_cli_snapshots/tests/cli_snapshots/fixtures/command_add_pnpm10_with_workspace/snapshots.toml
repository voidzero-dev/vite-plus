[[case]]
name = "command_add_pnpm10_with_workspace"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "add", "testnpm2", "-D", "-w"], comment = "should add package to workspace root" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "@vite-plus-test/utils", "--workspace"], comment = "should add @vite-plus-test/utils to workspace root" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "testnpm2", "test-vite-plus-install@1.0.0", "--filter", "app"], comment = "should add packages to packages/app" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "@vite-plus-test/utils", "--workspace", "--filter", "app"], comment = "should add @vite-plus-test/utils to packages/app" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "-E", "testnpm2", "test-vite-plus-install", "--filter", "*"], comment = "should add testnpm2 test-vite-plus-install to all packages except workspace root" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "install", "test-vite-plus-package@1.0.0", "--filter", "*", "--workspace-root", "--save-catalog"], comment = "should install packages alias for add command" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json", "pnpm-workspace.yaml"], continue-on-failure = true },
  { argv = ["vp", "add", "--filter", "app", "test-vite-plus-package-optional", "--save-catalog-name", "v1"], comment = "should add with save-catalog-name" },
  { argv = ["vpt", "print-file", "packages/app/package.json", "pnpm-workspace.yaml"], continue-on-failure = true },
  { argv = ["vp", "add", "--filter=./packages/utils", "test-vite-plus-package-optional", "-O", "--save-catalog-name", "v2"], comment = "should add other with save-catalog-name" },
  { argv = ["vpt", "print-file", "packages/utils/package.json", "pnpm-workspace.yaml"], continue-on-failure = true },
]
