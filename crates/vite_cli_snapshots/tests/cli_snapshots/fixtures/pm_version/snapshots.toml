[[case]]
name = "pm_version_npm"
vp = "local"
cwd = "npm"
steps = [
  { argv = ["vp", "pm", "version", "patch", "--", "--no-git-tag-version"], comment = "npm bumps the package version", continue-on-failure = true },
  { argv = ["vp", "pm", "version", "2.0.0", "--json", "--", "--no-git-tag-version"], comment = "npm accepts an explicit version with JSON output", continue-on-failure = true },
  { argv = ["vp", "pm", "version", "prerelease", "--", "--preid", "beta", "--no-git-tag-version"], comment = "npm creates a prerelease with a custom identifier", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "verify the version was updated" },
]

