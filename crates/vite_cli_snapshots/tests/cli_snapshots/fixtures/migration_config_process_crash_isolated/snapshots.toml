[[case]]
name = "migration_config_process_crash_isolated"
vp = "local"
steps = [
  { argv = ["vp", "migrate", "--no-interactive", "--no-hooks"], comment = "project config process handlers must not terminate migration", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "migration still rewrites the config after its compatibility probe crashes", continue-on-failure = true },
]
