[[case]]
name = "command_remove_bun"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "remove", "--help"], comment = "should show help", continue-on-failure = true },
  { argv = ["vp", "remove"], comment = "should error because no packages specified", continue-on-failure = true },
  { argv = ["vp", "remove", "testnpm2", "-D"], comment = "should error when remove not exists package from dev dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "testnpm2"], comment = "should add packages to dependencies" },
  ["vp", "add", "-D", "test-vite-plus-install"],
  ["vp", "add", "-O", "test-vite-plus-package-optional"],
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "testnpm2", "test-vite-plus-install"], comment = "should remove packages from dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "-O", "test-vite-plus-package-optional"], comment = "should remove package from optional dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
]
