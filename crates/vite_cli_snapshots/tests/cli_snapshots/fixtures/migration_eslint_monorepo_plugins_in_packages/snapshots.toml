[[case]]
name = "migration_eslint_monorepo_plugins_in_packages"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "workspace packages get the SAME aggressive cleanup as the root (deps, configs, lint-staged)", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "root: eslint + eslint-config-airbnb removed", continue-on-failure = true },
  { argv = ["vpt", "print-file", "packages/app/package.json"], comment = "workspace: eslint, eslint-plugin-vue, @typescript-eslint/parser removed; @typescript-eslint/utils preserved (reusable AST lib)", continue-on-failure = true },
  { argv = ["vpt", "print-file", "packages/lint-config/package.json"], comment = "workspace: all eslint-plugin-* removed; peerDeps.eslint scrubbed (field deleted when empty)", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "packages/app/eslint.config.mjs", "--assert-not", "file"], comment = "workspace eslint config is deleted", continue-on-failure = true },
  { argv = ["vpt", "print-file", "packages/app/.lintstagedrc.json"], comment = "workspace lint-staged rewritten (eslint --fix → vp lint --fix)", continue-on-failure = true },
]
