[[case]]
name = "command_pm_approve_builds_pnpm11"
vp = "global"
steps = [
  { argv = ["vp", "pm", "approve-builds", "--all"], comment = "forwards pnpm approve-builds --all (nothing to approve)", continue-on-failure = true },
  { argv = ["vp", "pm", "approve-builds", "esbuild", "!core-js"], comment = "pnpm 11.x supports !pkg deny syntax — forwarded as positional args", continue-on-failure = true },
]
