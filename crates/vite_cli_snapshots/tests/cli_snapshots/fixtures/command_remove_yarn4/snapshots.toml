[[case]]
name = "command_remove_yarn4"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "remove", "testnpm2", "-D"], comment = "should error when remove not exists package" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "testnpm2"], comment = "should add packages to dependencies" },
  ["vp", "add", "-D", "test-vite-plus-install"],
  ["vp", "add", "-O", "test-vite-plus-package-optional"],
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "testnpm2", "test-vite-plus-install"], comment = "should remove packages from dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "-D", "test-vite-plus-package-optional"], comment = "support ignore -O flag and remove package from optional dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "-g", "--dry-run", "testnpm2"], comment = "support remove global package with dry-run" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
]
