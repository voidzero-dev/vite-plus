local-registry = true
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "install", "-g", ".", "voidzero-nonexistent-pkg-xyz-23456"], continue-on-failure = true },
  { argv = ["install-fail-local-package"], continue-on-failure = true },
