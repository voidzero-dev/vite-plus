[[case]]
name = "migration_composed_husky_prepare"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should replace husky in composed prepare script", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check prepare becomes 'vp config --hooks-dir .husky && npm run build' without leftover husky", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
]
