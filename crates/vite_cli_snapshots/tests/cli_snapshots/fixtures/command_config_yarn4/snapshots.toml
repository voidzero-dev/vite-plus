[[case]]
name = "command_config_yarn4"
vp = "global"
steps = [
  { argv = ["vp", "pm", "config", "--help"], comment = "should show help", continue-on-failure = true },
  { argv = ["vp", "pm", "config", "set", "vite-plus-pm-config-test-key", "test-value", "--location", "project"], comment = "should set config value in project scope", continue-on-failure = true },
  { argv = ["vp", "pm", "config", "get", "vite-plus-pm-config-test-key", "--location", "project"], comment = "should get config value from project scope", continue-on-failure = true },
  { argv = ["vp", "pm", "config", "delete", "vite-plus-pm-config-test-key", "--location", "project"], comment = "should delete config key from project scope (uses yarn config unset)", continue-on-failure = true },
]
