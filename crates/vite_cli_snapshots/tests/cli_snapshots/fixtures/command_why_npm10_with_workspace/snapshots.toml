[[case]]
name = "command_why_npm10_with_workspace"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "install"], continue-on-failure = true },
  { argv = ["vp", "why", "testnpm2", "--filter", "app"], comment = "should check why in specific workspace using --workspace", continue-on-failure = true },
  { argv = ["vp", "why", "test-vite-plus-package", "--filter", "app"], comment = "should check why dev dependencies in app workspace", continue-on-failure = true },
  { argv = ["vp", "why", "testnpm2", "--filter", "app", "--json"], comment = "should support json output with workspace filter", continue-on-failure = true },
]
