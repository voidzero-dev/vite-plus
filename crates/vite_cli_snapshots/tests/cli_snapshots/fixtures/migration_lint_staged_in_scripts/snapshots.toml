[[case]]
name = "migration_lint_staged_in_scripts"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should rewrite lint-staged commands in scripts", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check-staged script should use vp staged, lint-staged removed from devDeps", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "check staged config migrated to vite.config.ts", continue-on-failure = true },
]
