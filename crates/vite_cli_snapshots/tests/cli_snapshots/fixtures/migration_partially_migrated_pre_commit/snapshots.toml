[[case]]
name = "migration_partially_migrated_pre_commit"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "should warn about husky v8 and skip hooks setup", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "husky/lint-staged should remain in devDeps, prepare should stay as husky", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".husky/pre-commit"], comment = "hook file should be unchanged (still has bootstrap)", continue-on-failure = true },
]
