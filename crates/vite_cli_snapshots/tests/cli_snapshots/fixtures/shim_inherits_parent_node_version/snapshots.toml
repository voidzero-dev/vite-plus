[[case]]
name = "shim_inherits_parent_node_version"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "env", "exec", "node", "-v"], comment = "Root: uses .node-version directly", continue-on-failure = true },
  { argv = ["vp", "env", "exec", "node", "-v"], cwd = "packages/app", comment = "Sub-package: inherits parent .node-version", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "packages/app/.node-version", "--assert-not", "file"], comment = "Verify no .node-version created in sub-package", continue-on-failure = true },
]
