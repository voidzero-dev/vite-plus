[[case]]
name = "vp_build_cache_disabled"
vp = "local"
steps = [
  { argv = ["vp", "run", "app#build"], comment = "first build", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "list-dir", "packages/app/dist"], comment = "should have the build output", continue-on-failure = true },
  { argv = ["vp", "run", "app#build"], comment = "cache disabled, no cache hit", continue-on-failure = true },
  { argv = ["vp", "run", "app#build"], comment = "should show cache disabled", continue-on-failure = true },
]
