[[case]]
name = "command_add_npm11_with_workspace"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "add", "testnpm2", "-D", "-w", "--", "--no-audit"], comment = "should add package to workspace root" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "@vite-plus-test/utils", "--workspace", "--", "--no-audit"], comment = "should add @vite-plus-test/utils to workspace root" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "testnpm2", "test-vite-plus-install@1.0.0", "--filter", "app", "--", "--no-audit"], comment = "should add packages to packages/app" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "@vite-plus-test/utils", "--workspace", "--filter", "app", "--", "--no-audit"], comment = "should add @vite-plus-test/utils to packages/app" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "testnpm2", "test-vite-plus-install@1.0.0", "--filter", "*", "--", "--no-audit"], comment = "should add testnpm2 test-vite-plus-install to all packages except workspace root" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "-E", "testnpm2", "test-vite-plus-install@1.0.0", "--filter", "*", "--workspace-root", "--", "--no-audit"], comment = "should add testnpm2 test-vite-plus-install to all packages include workspace root" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "install", "test-vite-plus-package@1.0.0", "--filter", "*", "--workspace-root", "--", "--no-audit"], comment = "should install packages alias for add command" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
]
