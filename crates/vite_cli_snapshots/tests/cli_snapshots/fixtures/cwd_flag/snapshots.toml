[[case]]
name = "cwd_flag"
vp = ["local", "global"]
comment = """
The global -C flag runs any command as if vp was started in the directory:
pack and run behave byte-identically to the cd forms, a missing directory
errors, and the positional keeps upstream tsdown entry semantics
(rfcs/cwd-flag.md).
"""
steps = [
  { argv = ["vp", "-C", "packages/hello", "pack"], comment = "-C packs the package from the workspace root" },
  { argv = ["vpt", "list-dir", "packages/hello/dist"], comment = "output lands in the target package" },
  { argv = ["vpt", "rm", "-rf", "packages/hello/dist"], comment = "reset so both forms produce identical output" },
  { argv = ["vp", "pack"], cwd = "packages/hello", comment = "the cd form is equivalent" },
  { argv = ["vp", "-C", "packages/hello", "run", "where"], comment = "-C applies to vp run as well" },
  { argv = ["vp", "run", "where"], cwd = "packages/hello", comment = "equivalent cd form for run" },
  { argv = ["vpr", "-C", "packages/hello", "where"], comment = "vpr -C <dir> <task> consumes the flag and runs the task in <dir> (global vpr shim and local bin/vpr)" },
  { argv = ["vpr", "where"], cwd = "packages/hello", comment = "equivalent cd form for vpr" },
  { argv = ["vpr", "-C"], comment = "bare vpr -C reports the missing directory argument instead of running a task named -C", continue-on-failure = true },
  { argv = ["vp", "-C", "packages/missing", "build"], comment = "missing directory errors", continue-on-failure = true },
  { argv = ["vp", "pack", "packages/hello"], comment = "positional stays a tsdown entry resolved from the invocation directory" },
  { argv = ["vpt", "list-dir", "dist"], comment = "upstream semantics: output lands at the invocation directory" },
  { argv = ["vp", "run", "where:hello"], comment = "a script whose command starts with vp -C runs verbatim and honors the directory" },
]

# Repro for the -C direct-exec PWD gap: a command run through `env exec`
# (the node/npm/npx shim dispatch, not the JS-delegation path) must observe
# `process.env.PWD` synced to the -C target, exactly like the cd form, so
# `-C dir` is equivalent to `cd dir`. Bug: -C only changes the process cwd,
# so the child inherits the original PWD and prints `matches cwd: false`.
[[case]]
name = "cwd_flag_pwd_env_exec"
vp = ["global"]
comment = """
`vp -C <dir> env exec <tool>` must give the spawned tool the same PWD as
`cd <dir> && vp env exec <tool>`. The boolean keeps the assertion path- and
redaction-independent.
"""
steps = [
  { argv = ["vp", "-C", "packages/hello", "env", "exec", "node", "-e", "console.log('PWD matches cwd: ' + (process.env.PWD === process.cwd()))"], comment = "-C form: the direct-exec child should see PWD synced to the target" },
  { argv = ["vp", "env", "exec", "node", "-e", "console.log('PWD matches cwd: ' + (process.env.PWD === process.cwd()))"], cwd = "packages/hello", comment = "equivalent cd form (baseline: true)" },
]
