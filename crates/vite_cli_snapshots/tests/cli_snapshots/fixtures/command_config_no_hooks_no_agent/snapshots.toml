[[case]]
name = "command_config_no_hooks_no_agent"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "config", "--no-hooks", "--no-agent"], comment = "should skip hook installation and agent instruction updates", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".vite-hooks/_/pre-commit", "--assert", "missing"], comment = "should not install hooks", continue-on-failure = true },
  { argv = ["vpt", "grep-file", "AGENTS.md", "OUTDATED CONTENT"], comment = "agent must stay unchanged (outdated marker still present)" },
]
