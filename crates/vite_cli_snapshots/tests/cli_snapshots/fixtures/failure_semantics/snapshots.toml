[[case]]
name = "line_boundary_on_failure"
vp = "global"
comment = """
Locks in the failure-flow contract: a failing step skips the rest of its
line (up to and including the next continue-on-failure step, the line
terminator in migrated fixtures) and the following line resumes; without a
boundary ahead, the case stops.
"""
steps = [
  { argv = ["vpt", "exit", "1"], comment = "chain member fails: the rest of this line is skipped" },
  { argv = ["vpt", "print", "same line, never runs"], continue-on-failure = true },
  { argv = ["vpt", "print", "next line still runs"], continue-on-failure = true },
]

[[case]]
name = "stat_file_assert_guard"
vp = "global"
comment = """
`test -f x && cmd` migrates to a stat-file --assert guard: on mismatch the
guard fails and the guarded command is skipped to the line boundary, exactly
the shell's short-circuit.
"""
steps = [
  ["vpt", "write-file", "marker-present.txt", "here"],
  { argv = ["vpt", "stat-file", "marker-absent.txt", "--assert", "file"], comment = "guard on a missing marker fails" },
  { argv = ["vpt", "print", "guarded, never runs"], continue-on-failure = true },
  { argv = ["vpt", "stat-file", "marker-present.txt", "--assert", "file"], comment = "guard on an existing marker passes" },
  { argv = ["vpt", "print", "guarded, runs"], continue-on-failure = true },
]
