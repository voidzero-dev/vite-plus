[[case]]
name = "command_update_npm10"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "update", "testnpm2", "--", "--no-audit"], comment = "should update package within semver range" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "up", "testnpm2", "--latest", "--", "--no-audit"], comment = "should to absolute latest version" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "update", "-D", "--", "--no-audit"], comment = "should update only dev dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "update", "-P", "--no-save", "--", "--no-audit"], comment = "should update only dependencies and optionalDependencies without saving" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "rm", "testnpm2"], comment = "should skip optional dependencies" },
  ["vp", "add", "testnpm2@1.0.0", "-O", "--", "--no-audit"],
  ["vp", "update", "--no-optional", "--latest", "--", "--no-audit"],
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "update", "--", "--no-audit"], comment = "should update all packages but won't change the package.json" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
]
