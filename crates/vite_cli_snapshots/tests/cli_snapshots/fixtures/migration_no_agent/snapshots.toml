[[case]]
name = "migration_no_agent"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-agent", "--no-interactive"], comment = "migration with --no-agent should skip agent instructions", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "AGENTS.md", "--assert-not", "file"], comment = "no AGENTS.md created with --no-agent", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "CLAUDE.md", "--assert-not", "file"], comment = "no CLAUDE.md created with --no-agent", continue-on-failure = true },
]
