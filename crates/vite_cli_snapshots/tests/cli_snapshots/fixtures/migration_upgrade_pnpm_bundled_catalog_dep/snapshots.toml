[[case]]
name = "migration_upgrade_pnpm_bundled_catalog_dep"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "existing Vite+ pnpm project declared bundled tools (oxlint/oxlint-tsgolint/oxfmt/tsdown) via catalog:", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "the bundled tools are removed (vite-plus provides them) so no dangling catalog: references survive", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "the same bundled tools are dropped from the catalog, keeping package.json and the catalog consistent", continue-on-failure = true },
]
