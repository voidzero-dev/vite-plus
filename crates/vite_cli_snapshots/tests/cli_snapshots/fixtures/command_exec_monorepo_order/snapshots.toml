[[case]]
name = "command_exec_monorepo_order"
vp = "local"
skip-platforms = ["windows"]
env = { VITE_DISABLE_AUTO_INSTALL = "1" }
steps = [
  { argv = ["vp", "exec", "-r", "--", "node", "-e", "console.log(process.env.VP_PACKAGE_NAME)"], comment = "recursive: topological order", continue-on-failure = true },
  { argv = ["vp", "exec", "--filter", "app-web...", "--", "node", "-e", "console.log(process.env.VP_PACKAGE_NAME)"], comment = "filter with transitive deps", continue-on-failure = true },
  { argv = ["vp", "exec", "--filter", "lib-ui...", "--", "node", "-e", "console.log(process.env.VP_PACKAGE_NAME)"], comment = "filter mid-graph with deps", continue-on-failure = true },
  { argv = ["vp", "exec", "--filter", "...lib-core", "--", "node", "-e", "console.log(process.env.VP_PACKAGE_NAME)"], comment = "filter dependents of foundation", continue-on-failure = true },
  { argv = ["vp", "exec", "-r", "--reverse", "--", "node", "-e", "console.log(process.env.VP_PACKAGE_NAME)"], comment = "reverse topological order", continue-on-failure = true },
  { argv = ["vp", "exec", "--filter", "cycle-a...", "--", "node", "-e", "console.log(process.env.VP_PACKAGE_NAME)"], comment = "cycle member with non-cyclic dep: lib-core before cycle-a", continue-on-failure = true },
]
