[[case]]
name = "migration_tsconfig_esmoduleinterop"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "should remove esModuleInterop: false from tsconfig.json", continue-on-failure = true },
  { argv = ["vpt", "print-file", "tsconfig.json"], comment = "verify esModuleInterop: false is removed", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "check vite.config.ts", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
]
