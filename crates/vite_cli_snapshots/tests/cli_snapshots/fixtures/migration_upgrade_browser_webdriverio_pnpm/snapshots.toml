[[case]]
name = "migration_upgrade_browser_webdriverio_pnpm"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "source-only WebdriverIO provider should be restored", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "provider, webdriverio, and local vitest should be present", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "driver builds and shared vitest should be enabled", continue-on-failure = true },
]
