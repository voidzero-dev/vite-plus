[[case]]
name = "command_unlink_yarn4"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vpt", "mkdir", "-p", "../unlink-test-lib-yarn"], comment = "create test library" },
  { argv = ["vpt", "write-file", "../unlink-test-lib-yarn/package.json", "{\"name\": \"unlink-test-lib-yarn\", \"version\": \"1.0.0\"}\n"], continue-on-failure = true },
  { argv = ["vp", "link", "../unlink-test-lib-yarn"], comment = "link the library first" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "unlink", "unlink-test-lib-yarn"], comment = "should unlink the package" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "link", "../unlink-test-lib-yarn"], comment = "link again" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "unlink", "--recursive"], comment = "should unlink all with --all flag" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "unlink", "-r"], comment = "should work with -r short form" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
]
