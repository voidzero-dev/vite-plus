[[case]]
name = "migration_lintstagedrc_staged_exists"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "should warn when staged already exists in vite.config.ts", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".lintstagedrc.json", "--assert", "file"], comment = "lintstagedrc.json should still exist", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "vite config should be unchanged", continue-on-failure = true },
]
