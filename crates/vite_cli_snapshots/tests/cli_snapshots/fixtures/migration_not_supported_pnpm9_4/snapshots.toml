[[case]]
name = "migration_not_supported_pnpm9_4"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should fail because pnpm version is not supported", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json is not updated", continue-on-failure = true },
]
