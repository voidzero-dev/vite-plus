[[case]]
name = "migration_husky_v8_preserves_lint_staged"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "should warn about husky v8, preserve lint-staged config", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "lint-staged config should still be in package.json", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
]
