[[case]]
name = "migration_upgrade_setup_skipped_default_pnpm"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "existing Vite+ project: upgrade the toolchain version only, skip the full setup", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "vite-plus version upgrade is applied", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "pnpm settings consolidated by the version upgrade", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".nvmrc", "--assert", "file"], comment = ".nvmrc is left untouched without --full", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".node-version", "--assert-not", "file"], comment = "no .node-version is written", continue-on-failure = true },
  { argv = ["vpt", "print-file", "tsconfig.json"], comment = "tsconfig baseUrl is left untouched without --full", continue-on-failure = true },
]
