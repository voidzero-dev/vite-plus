[[case]]
name = "migration_existing_pre_commit"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "mkdir", "-p", ".husky"], snapshot = false },
  { argv = ["vpt", "write-file", ".husky/pre-commit", "#!/usr/bin/env sh\nnpm test\nsecret-scan\n"], snapshot = false },
  { argv = ["vpt", "chmod", "755", ".husky/pre-commit"], snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "print-file", ".husky/pre-commit"], comment = "check existing pre-commit hook before migration", continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should preserve existing pre-commit contents", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/pre-commit"], comment = "check pre-commit hook preserves existing commands", continue-on-failure = true },
]
