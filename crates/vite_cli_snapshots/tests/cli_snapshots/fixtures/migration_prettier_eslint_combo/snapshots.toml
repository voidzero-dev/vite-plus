[[case]]
name = "migration_prettier_eslint_combo"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should detect both eslint and prettier and auto-migrate", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check eslint and prettier removed, scripts rewritten", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "eslint.config.mjs", "--assert-not", "file"], comment = "check eslint config is removed", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".prettierrc.json", "--assert-not", "file"], comment = "check prettier config is removed", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "check oxlint and oxfmt config merged into vite.config.ts", continue-on-failure = true },
]
