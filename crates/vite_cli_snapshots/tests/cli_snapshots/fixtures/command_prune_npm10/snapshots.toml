[[case]]
name = "command_prune_npm10"
vp = "global"
steps = [
  { argv = ["vp", "install"], comment = "should install packages first", continue-on-failure = true },
  { argv = ["vp", "pm", "prune", "--help"], comment = "should show help", continue-on-failure = true },
  { argv = ["vp", "pm", "prune"], comment = "should prune extraneous dependencies", continue-on-failure = true },
  { argv = ["vp", "pm", "prune", "--prod"], comment = "should prune dev dependencies (uses --omit=dev)", continue-on-failure = true },
  { argv = ["vp", "pm", "prune", "--no-optional"], comment = "should prune optional dependencies (uses --omit=optional)", continue-on-failure = true },
  { argv = ["vp", "pm", "prune", "--prod", "--no-optional"], comment = "should prune both dev and optional dependencies", continue-on-failure = true },
  { argv = ["vp", "pm", "prune", "--", "--loglevel=warn"], comment = "should support pass through arguments", continue-on-failure = true },
]
