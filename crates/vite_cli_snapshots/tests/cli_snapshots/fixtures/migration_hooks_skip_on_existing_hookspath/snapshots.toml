[[case]]
name = "migration_hooks_skip_on_existing_hookspath"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["git", "config", "core.hooksPath", ".custom-hooks"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "should skip hooks because core.hooksPath is already set", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "prepare should stay 'husky' and husky must remain in devDependencies", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["git", "config", "--local", "core.hooksPath"], comment = "should still be .custom-hooks", continue-on-failure = true },
]
