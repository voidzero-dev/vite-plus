[[case]]
name = "migration_lintstagedrc_not_support"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should not support non-json format lintstagedrc", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".lintstagedrc"], comment = "check .lintstagedrc is not updated", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".lintstagedrc.yaml"], comment = "check .lintstagedrc.yaml is not updated", continue-on-failure = true },
  { argv = ["vpt", "print-file", "lint-staged.config.mjs"], comment = "check lint-staged.config.mjs is not updated", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check hooks setup skipped but husky/lint-staged removed from devDependencies", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
]
