[[case]]
name = "migration_add_git_hooks"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should add git hooks setup", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json has prepare script and lint-staged config", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/pre-commit"], comment = "check pre-commit hook", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".vite-hooks/_", "--assert", "dir"], comment = "hook shims exist (vp config ran)", continue-on-failure = true },
  { argv = ["git", "config", "--local", "core.hooksPath"], comment = "should be set to .vite-hooks/_", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/_/.gitignore"], comment = "internal gitignore should exclude all files", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/_/h"], comment = "hook dispatcher script content", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/_/pre-commit"], comment = "hook shim should source the dispatcher", continue-on-failure = true },
  { argv = ["vpt", "list-dir", ".vite-hooks/_"], comment = "list all generated hook shims", continue-on-failure = true },
]
