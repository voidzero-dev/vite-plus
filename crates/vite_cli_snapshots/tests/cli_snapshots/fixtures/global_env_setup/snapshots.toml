[[case]]
name = "global_home_shims"
vp = "global"
skip-platforms = ["windows"]
comment = "The global flavor installs the case-local standalone layout and only exposes VP_HOME/bin tools."
steps = [
  { argv = ["vp", "--version"], comment = "vp resolves from the case home shim", snapshot = false },
  { argv = ["node", "--version"], comment = "node resolves from the case home shim", snapshot = false },
  { argv = ["vpt", "stat-file", "../home/.vite-plus/current/bin/vp", "../home/.vite-plus/current/node_modules/vite-plus/bin/vp", "../home/.vite-plus/bin/vp", "../home/.vite-plus/bin/vpr", "../home/.vite-plus/bin/vpx", "../home/.vite-plus/bin/node", "--assert", "file"], comment = "vp env setup created the shims inside the case home" },
]

[[case]]
name = "local_home_shims"
vp = "local"
skip-platforms = ["windows"]
comment = "The local flavor installs the case-local standalone layout, then exposes the case-local package bin."
steps = [
  { argv = ["vp", "--version"], comment = "vp resolves from the case-local package bin", snapshot = false },
  { argv = ["node", "--version"], comment = "node resolves from the case home shim", snapshot = false },
  { argv = ["vpt", "stat-file", "../home/.vite-plus/current/bin/vp", "../home/.vite-plus/current/node_modules/vite-plus/bin/vp", "../home/.vite-plus/current/node_modules/vite-plus/bin/vpr", "../home/.vite-plus/current/node_modules/vite-plus/bin/oxfmt", "../home/.vite-plus/current/node_modules/vite-plus/bin/oxlint", "../home/.vite-plus/bin/vp", "../home/.vite-plus/bin/vpr", "../home/.vite-plus/bin/vpx", "../home/.vite-plus/bin/node", "--assert", "file"], comment = "vp env setup created shims and the local package bin is inside the case home" },
]
