[[case]]
name = "migration_env_prefix_lint_staged"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should replace env-prefixed lint-staged in pre-commit", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check husky/lint-staged removed, staged config in vite.config.ts", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "check staged config migrated to vite.config.ts", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/pre-commit"], comment = "check env prefix preserved with vp staged", continue-on-failure = true },
]
