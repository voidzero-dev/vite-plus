[[case]]
name = "runnable_root_runs_in_place"
vp = ["local", "global"]
comment = """
A workspace root that is itself a runnable app never elicits: bare vp build
runs in place (pre-elicitation behavior), without picker output.
"""
steps = [["vp", "build"]]

[[case]]
name = "runnable_root_non_tty"
vp = ["local", "global"]
comment = "Same without a TTY: no listing, the build runs in place (CI shape)."
steps = [{ argv = ["vp", "build"], tty = false }]
