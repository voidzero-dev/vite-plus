[[case]]
name = "migration_existing_husky_lint_staged"
vp = "global"
steps = [
  { argv = ["git", "init"], snapshot = false, continue-on-failure = true },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should rewrite husky and lint-staged", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check prepare rewritten, lint-staged removed, both removed from devDeps", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "check staged config migrated to vite.config.ts", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/pre-commit"], comment = "check pre-commit hook rewritten", continue-on-failure = true },
]
