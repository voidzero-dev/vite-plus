[[case]]
name = "create_approve_builds_bun"
vp = "local"
skip-platforms = ["windows"]
env = { ADBLOCK = "1" }
unset-env = ["VP_SKIP_INSTALL", "CI"]
local-registry = true
steps = [
  { argv = ["vp", "create", "@your-org:with-build-dep", "--no-interactive", "--approve-builds", "--package-manager", "bun", "--directory", "approved-app"], comment = "--approve-builds runs `bun pm trust` for the gated build script (core-js)", continue-on-failure = true },
  { argv = ["vpt", "print-file", "approved-app/package.json"], comment = "core-js recorded under trustedDependencies", continue-on-failure = true },
  { argv = ["vp", "create", "@your-org:with-build-dep", "--no-interactive", "--package-manager", "bun", "--directory", "default-app"], comment = "default run surfaces the gated build with guidance, leaving it untrusted", continue-on-failure = true },
  { argv = ["vpt", "print-file", "default-app/package.json"], comment = "no trustedDependencies, the build was not run", continue-on-failure = true },
  { argv = ["vp", "pm", "approve-builds", "core-js"], cwd = "default-app", comment = "the guidance's `vp pm approve-builds` command approves the gated build", continue-on-failure = true },
  { argv = ["vpt", "print-file", "default-app/package.json"], comment = "core-js is now recorded under trustedDependencies", continue-on-failure = true },
]
