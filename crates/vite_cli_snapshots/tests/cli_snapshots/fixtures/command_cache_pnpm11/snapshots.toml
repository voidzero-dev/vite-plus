[[case]]
name = "command_cache_pnpm11"
vp = "global"
steps = [
  { argv = ["vp", "pm", "cache", "--help"], comment = "should show help", continue-on-failure = true },
  { argv = ["vp", "pm", "cache", "dir"], comment = "should show cache directory (uses pnpm store path)", snapshot = false, continue-on-failure = true },
  { argv = ["vp", "pm", "cache", "path"], comment = "should show cache path (alias for dir, uses pnpm store path)", snapshot = false, continue-on-failure = true },
]
