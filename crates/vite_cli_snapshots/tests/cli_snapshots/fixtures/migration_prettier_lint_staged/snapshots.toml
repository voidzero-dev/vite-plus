[[case]]
name = "migration_prettier_lint_staged"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should detect prettier and auto-migrate including lint-staged", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check prettier removed, scripts rewritten, lint-staged rewritten", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "check oxfmt config and staged config merged into vite.config.ts", continue-on-failure = true },
]
