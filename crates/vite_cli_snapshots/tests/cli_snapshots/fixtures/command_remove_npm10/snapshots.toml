[[case]]
name = "command_remove_npm10"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "remove", "testnpm2", "-D", "--", "--no-audit"], comment = "should pass when remove not exists package" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "add", "testnpm2", "--", "--no-audit"], comment = "should add packages to dependencies" },
  ["vp", "add", "-D", "test-vite-plus-install", "--", "--no-audit"],
  ["vp", "add", "-O", "test-vite-plus-package-optional", "--", "--no-audit"],
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "testnpm2", "test-vite-plus-install", "--", "--no-audit"], comment = "should remove packages from dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "-D", "test-vite-plus-package-optional", "--", "--loglevel=warn", "--no-audit"], comment = "support ignore -O flag and remove package from optional dependencies" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "-g", "--dry-run", "testnpm2"], comment = "support remove global package with dry-run" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
]
