[[case]]
name = "migration_from_vitest_config"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should rewrite imports to vite-plus", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vitest.config.ts"], comment = "check vitest.config.ts", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
]
