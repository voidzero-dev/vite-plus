[[case]]
name = "migration_bunfig_no_install_section"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration preserves bunfig.toml without an install section", continue-on-failure = true },
  { argv = ["vpt", "print-file", "bunfig.toml"], comment = "check Bun configuration is unchanged", continue-on-failure = true },
]
