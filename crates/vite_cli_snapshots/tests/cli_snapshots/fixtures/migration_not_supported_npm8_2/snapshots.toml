[[case]]
name = "migration_not_supported_npm8_2"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should fail because npm version is not supported", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json is not updated", continue-on-failure = true },
]
