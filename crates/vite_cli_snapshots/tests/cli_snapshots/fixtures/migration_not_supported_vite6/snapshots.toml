[[case]]
name = "migration_not_supported_vite6"
vp = "global"
steps = [
  { argv = ["vpt", "write-file", "node_modules/vite/package.json", "{\"name\":\"vite\",\"version\":\"6.4.3\"}"], comment = "stub the installed vite so migrate reads the unsupported version offline", snapshot = false },
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should fail because vite version is not supported", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json is not updated", continue-on-failure = true },
]
