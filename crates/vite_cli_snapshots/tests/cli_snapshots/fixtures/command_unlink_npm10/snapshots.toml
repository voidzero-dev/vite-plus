[[case]]
name = "command_unlink_npm10"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vpt", "mkdir", "-p", "../unlink-test-lib-npm"], comment = "create test library" },
  { argv = ["vpt", "write-file", "../unlink-test-lib-npm/package.json", "{\"name\": \"unlink-test-lib-npm\", \"version\": \"1.0.0\"}\n"], continue-on-failure = true },
  { argv = ["vp", "link", "../unlink-test-lib-npm"], comment = "link the library first" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
  { argv = ["vp", "unlink", "unlink-test-lib-npm"], comment = "should unlink the package" },
  { argv = ["vpt", "print-file", "package.json"], continue-on-failure = true },
]
