[[case]]
name = "new_vite_monorepo"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "create", "vite:monorepo", "--no-interactive", "--git", "--editor", "vscode"], comment = "create monorepo with default values", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "list-dir", "vite-plus-monorepo"], comment = "check files created", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite-plus-monorepo/package.json"], comment = "check package.json", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite-plus-monorepo/vite.config.ts"], comment = "check vite config has cache enabled", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite-plus-monorepo/pnpm-workspace.yaml"], comment = "check workspace config", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/.gitignore", "--assert", "file"], comment = "verify gitignore renamed from _gitignore", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/.yarnrc.yml", "--assert-not", "file"], comment = "verify no yarn config for pnpm", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/.git", "--assert", "dir"], comment = "check git init", continue-on-failure = true },
  { argv = ["vp", "create", "vite:monorepo", "--interactive", "--verbose", "--no-git", "--no-hooks", "--no-agent", "--no-editor", "--package-manager", "pnpm", "--directory", "verbose-no-git-monorepo"], comment = "explicit --no-git should skip verbose monorepo git prompt", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "stat-file", "verbose-no-git-monorepo/.git", "--assert-not", "dir"], comment = "check verbose --no-git is respected", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/.vscode/settings.json", "--assert", "file"], comment = "check VS Code settings created", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/.vscode/extensions.json", "--assert", "file"], comment = "check VS Code extensions created", continue-on-failure = true },
  { argv = ["node", "check-trackable.cjs", "vite-plus-monorepo", ".vscode/settings.json"], comment = "check VS Code settings are trackable", continue-on-failure = true },
  { argv = ["node", "check-trackable.cjs", "vite-plus-monorepo", ".vscode/extensions.json"], comment = "check VS Code extensions are trackable", continue-on-failure = true },
  { argv = ["vpt", "list-dir", "vite-plus-monorepo/apps"], comment = "check apps directory created", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite-plus-monorepo/apps/website/package.json"], comment = "check website keeps aliased vite for pnpm (workspace override stays effective)", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite-plus-monorepo/packages/utils/package.json"], comment = "check utils normalizes vite-plus to catalog:", continue-on-failure = true },
  { argv = ["vp", "create", "--no-interactive", "vite:application"], cwd = "vite-plus-monorepo", comment = "create application in non-interactive mode", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "list-dir", "vite-plus-monorepo/apps"], comment = "check apps directory created", continue-on-failure = true },
  { argv = ["vpt", "list-dir", "vite-plus-monorepo/apps/vite-plus-application/package.json"], comment = "check vite-plus-application package.json", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/apps/vite-plus-application/.vscode", "--assert", "missing"], comment = "monorepo package create without --editor should not write VS Code config", continue-on-failure = true },
  { argv = ["vp", "create", "--no-interactive", "vite:application", "--directory", "apps/no-editor", "--no-editor"], cwd = "vite-plus-monorepo", comment = "create application with explicit editor opt-out inside monorepo", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/apps/no-editor/.vscode", "--assert", "missing"], comment = "--no-editor should not write VS Code config", continue-on-failure = true },
  { argv = ["vp", "create", "--no-interactive", "vite:application", "--directory", "apps/editor-opt-in", "--editor", "vscode"], cwd = "vite-plus-monorepo", comment = "create application with explicit editor opt-in inside monorepo", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/apps/editor-opt-in/.vscode/settings.json", "--assert", "file"], comment = "explicit --editor should write VS Code settings", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/apps/editor-opt-in/.vscode/extensions.json", "--assert", "file"], comment = "explicit --editor should write VS Code extensions", continue-on-failure = true },
  { argv = ["vp", "create", "--no-interactive", "vite:library"], cwd = "vite-plus-monorepo", comment = "create library in non-interactive mode", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "list-dir", "vite-plus-monorepo/packages/vite-plus-library/package.json"], comment = "check vite-plus-library package.json", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "vite-plus-monorepo/packages/vite-plus-library/.vscode", "--assert", "missing"], comment = "monorepo package create without --editor should not write VS Code config", continue-on-failure = true },
  { argv = ["vp", "create", "--no-interactive", "vite:generator"], cwd = "vite-plus-monorepo", comment = "create generator in non-interactive mode", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "list-dir", "vite-plus-monorepo/tools"], comment = "check tools directory created", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite-plus-monorepo/tools/vite-plus-generator/package.json"], comment = "check vite-plus-generator package.json", continue-on-failure = true },
  { argv = ["vp", "create", "vite:monorepo", "--no-interactive", "--directory", "my-vite-plus-monorepo"], comment = "create monorepo with custom directory", snapshot = false, continue-on-failure = true },
  { argv = ["vpt", "list-dir", "my-vite-plus-monorepo"], comment = "check files created", continue-on-failure = true },
  { argv = ["vpt", "print-file", "my-vite-plus-monorepo/package.json"], comment = "check package.json", continue-on-failure = true },
]
