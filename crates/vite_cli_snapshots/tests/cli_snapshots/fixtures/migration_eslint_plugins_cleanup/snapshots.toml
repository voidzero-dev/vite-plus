[[case]]
name = "migration_eslint_plugins_cleanup"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should remove ESLint, plugins, configs, scopes, formatters, and peer eslint", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "verify the comprehensive ESLint ecosystem cleanup", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "eslint.config.mjs", "--assert-not", "file"], comment = "check eslint config is removed", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "verify the generated vite.config.ts", continue-on-failure = true },
]
