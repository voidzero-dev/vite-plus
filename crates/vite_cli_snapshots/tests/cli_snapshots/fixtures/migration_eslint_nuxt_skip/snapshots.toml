[[case]]
name = "migration_eslint_nuxt_skip"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "@nuxt/eslint detected — ESLint migration is skipped with a warning", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "eslint, @nuxt/eslint, and eslint.config.mjs are preserved", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "eslint.config.mjs", "--assert", "file"], comment = "eslint config file is NOT deleted", continue-on-failure = true },
]
