[[case]]
name = "command_remove_pnpm11_with_workspace"
vp = "global"
skip-platforms = ["windows"]
steps = [
  { argv = ["vp", "add", "testnpm2", "-D", "-w", "--filter=*"], comment = "prepare packages" },
  ["vp", "add", "test-vite-plus-install", "-w", "--filter=*"],
  ["vp", "add", "test-vite-plus-package-optional", "-O", "--filter=*"],
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "testnpm2", "-r"], comment = "should remove package from all workspaces and root" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "-O", "test-vite-plus-package-optional", "-r"], comment = "should remove optional package from all workspaces" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "test-vite-plus-install", "--filter=app"], comment = "should remove package by filter=app" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
  { argv = ["vp", "remove", "test-vite-plus-install", "--filter=*"], comment = "should remove package by filter=*" },
  { argv = ["vpt", "print-file", "package.json", "packages/app/package.json", "packages/utils/package.json"], continue-on-failure = true },
]
