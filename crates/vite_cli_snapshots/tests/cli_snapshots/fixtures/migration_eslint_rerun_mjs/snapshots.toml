[[case]]
name = "migration_eslint_rerun_mjs"
vp = "global"
skip-platforms = [{ os = "linux", libc = "musl" }]
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "should detect vite-plus + eslint and auto-migrate eslint", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check eslint removed from devDependencies and scripts rewritten", continue-on-failure = true },
  { argv = ["vpt", "stat-file", "eslint.config.mjs", "--assert-not", "file"], comment = "check eslint config is removed", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.mjs"], comment = "check oxlint config merged into existing vite.config.mjs (not creating vite.config.ts)", continue-on-failure = true },
]
