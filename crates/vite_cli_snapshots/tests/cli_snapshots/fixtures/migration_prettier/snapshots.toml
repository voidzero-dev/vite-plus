[[case]]
name = "migration_prettier"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should detect prettier and auto-migrate", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check prettier removed and scripts rewritten", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".prettierrc.json", "--assert-not", "file"], comment = "check prettier config is removed", continue-on-failure = true },
  { argv = ["vpt", "print-file", "vite.config.ts"], comment = "check oxfmt config merged into vite.config.ts", continue-on-failure = true },
]
