[[case]]
name = "migration_no_git_repo"
vp = "global"
steps = [
  { argv = ["vp", "migrate", "--no-interactive"], comment = "migration should create .vite-hooks/pre-commit even without .git", continue-on-failure = true },
  { argv = ["vpt", "print-file", "package.json"], comment = "check package.json has prepare script and lint-staged config", continue-on-failure = true },
  { argv = ["vpt", "print-file", "pnpm-workspace.yaml"], comment = "check pnpm-workspace.yaml has overrides and catalog", continue-on-failure = true },
  { argv = ["vpt", "stat-file", ".vite-hooks", "--assert", "dir"], comment = "hooks dir exists even without .git", continue-on-failure = true },
  { argv = ["vpt", "print-file", ".vite-hooks/pre-commit"], comment = "pre-commit hook should exist even without .git", continue-on-failure = true },
]
